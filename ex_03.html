<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ex 03</title>
</head>
<body>
    <h2>Notas da Paty</h2><br>
    Entre com a nota 1: <input type="number" id="ipt_nota1"><br>
    Entre com a nota 2: <input type="number" id="ipt_nota2"><br>
    Entre com a nota 3: <input type="number" id="ipt_nota3"><br>
    <button onclick="analisar()">Analisar desempenho</button><br>
    <div id="div_msg"></div>
</body>
</html>
<script>
    function analisar(){
        let nota1 = Number(ipt_nota1.value);
        let nota2 = Number(ipt_nota2.value);
        let nota3 = Number(ipt_nota3.value);
        let media = (nota1 + nota2 + nota3) / 3
        div_msg.innerHTML = `Sua média foi de ${media.toFixed(2)}`

        if (media > 9.4  ) {
            div_msg.innerHTML = `Sua média foi de ${media.toFixed(2)}. <br>
            Parabéns, você é fora de série!`
        }
    }
</script>
