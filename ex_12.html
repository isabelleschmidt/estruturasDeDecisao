<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ex 12</title>
</head>
<body>
    <h1>Consulta de situação</h1><br>
    Insira a primeira nota: <input type="number" id="ipt_nota1"><br>
    Insira a segunda nota: <input type="number" id="ipt_nota2"><br>
    <button onclick="verificar()">Verificar situação</button>
    <div id="div_msg"></div>
    
</body>
</html>
<script>
    function verificar(){
        let nota1 = Number(ipt_nota1.value);
        let nota2 = Number(ipt_nota2.value);
        let media = (nota1 + nota2) / 2

        if (media >= 6) {
            div_msg.innerHTML = `Parabéns! Aprovado!`
        } else {
            div_msg.innerHTML = `Tente outra vez...`
        }
    }
</script>
