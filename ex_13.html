<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ex 13</title>
</head>
<body>
    <h1>Cálculo de altura</h1><br>
    Insira sua altura (em cm): <input type="number" id="ipt_altura"><br>
    <button onclick="analisar()">Analisar Estatura</button>
    <div id="div_msg"></div>
</body>
</html>
<script>
    function analisar(){
        let altura = Number(ipt_altura.value);

        if (altura <= 165) {
            div_msg.innerHTML = `Você pode ser piloto de corrida!`
        } else {
            if (altura <= 180) {
                div_msg.innerHTML = `Você pode ser jogador de futebol!`
            } else {
                div_msg.innerHTML = `Você pode ser jogador de vôlei ou basquete!`
            }
        }
    }
</script>
